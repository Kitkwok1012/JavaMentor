spring:
  application:
    name: javamentor
  
  datasource:
    url: jdbc:h2:${DB_PATH:-file:./data/javamentor};DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:false}
  
  thymeleaf:
    cache: ${THYMELEAF_CACHE:true}
    mode: HTML

  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

server:
  port: ${PORT:8080}

# Rate limiting config
ratelimit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${RATE_LIMIT_RPM:60}

logging:
  level:
    com.javamentor: INFO
    org.springframework.web: WARN
