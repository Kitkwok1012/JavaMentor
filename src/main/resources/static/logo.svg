<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Blue gradient for the book -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <!-- Amber gradient for the Java cup -->
    <linearGradient id="cupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <!-- Steam gradient -->
    <linearGradient id="steamGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>

  <!-- Open book body -->
  <g filter="url(#shadow)">
    <!-- Left page -->
    <path d="M48 70 Q68 65 100 72 L100 140 Q70 133 48 138 Z"
          fill="url(#bookGrad)" opacity="0.9"/>
    <!-- Right page -->
    <path d="M152 70 Q132 65 100 72 L100 140 Q130 133 152 138 Z"
          fill="#2563eb" opacity="0.85"/>
    <!-- Spine highlight -->
    <rect x="98" y="70" width="4" height="70" rx="2" fill="#93c5fd" opacity="0.6"/>
  </g>

  <!-- Left page lines (code-like) -->
  <g opacity="0.55">
    <rect x="57" y="84" width="32" height="2.5" rx="1.2" fill="white"/>
    <rect x="57" y="92" width="24" height="2.5" rx="1.2" fill="white"/>
    <rect x="57" y="100" width="28" height="2.5" rx="1.2" fill="white"/>
    <rect x="57" y="108" width="20" height="2.5" rx="1.2" fill="white"/>
    <rect x="57" y="116" width="30" height="2.5" rx="1.2" fill="white"/>
  </g>

  <!-- Right page lines -->
  <g opacity="0.45">
    <rect x="111" y="84" width="30" height="2.5" rx="1.2" fill="white"/>
    <rect x="111" y="92" width="22" height="2.5" rx="1.2" fill="white"/>
    <rect x="111" y="100" width="26" height="2.5" rx="1.2" fill="white"/>
    <rect x="111" y="108" width="18" height="2.5" rx="1.2" fill="white"/>
    <rect x="111" y="116" width="28" height="2.5" rx="1.2" fill="white"/>
  </g>

  <!-- Java coffee cup (top-right badge) -->
  <g transform="translate(118, 38)" filter="url(#shadow)">
    <!-- Cup body -->
    <path d="M6 8 L4 28 Q4 32 8 32 L22 32 Q26 32 26 28 L24 8 Z"
          fill="url(#cupGrad)"/>
    <!-- Cup rim -->
    <rect x="5" y="6" width="20" height="4" rx="2" fill="#fbbf24"/>
    <!-- Handle -->
    <path d="M26 13 Q34 13 34 20 Q34 27 26 27"
          fill="none" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
    <!-- Steam wisps -->
    <path d="M11 3 Q9 0 11 -3" fill="none" stroke="url(#steamGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M16 1 Q14 -2 16 -5" fill="none" stroke="url(#steamGrad)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M21 3 Q19 0 21 -3" fill="none" stroke="url(#steamGrad)" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- Checkmark badge (bottom-right, success indicator) -->
  <g transform="translate(126, 126)">
    <circle cx="18" cy="18" r="18" fill="#22c55e" filter="url(#shadow)"/>
    <polyline points="9,18 15,24 27,12"
              fill="none" stroke="white" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
