<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{search.title} + ' - JavaMentor'">Search - JavaMentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
        function changeLang(lang) {
            window.location.href = window.location.pathname + '?lang=' + lang;
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b dark:border-gray-700">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">JavaMentor</a>
            <div class="flex items-center space-x-4">
                <form th:action="@{/search}" method="get" class="flex">
                    <input type="text" name="keyword" th:value="${keyword}"
                           th:placeholder="#{search.placeholder}"
                           class="border rounded-l px-3 py-1 text-sm w-48 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded-r text-sm hover:bg-blue-700" th:text="#{search.button}">Search</button>
                </form>
                <select onchange="changeLang(this.value)" class="text-sm border rounded px-2 py-1 dark:bg-gray-700 dark:text-white">
                    <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                    <option value="zh" th:selected="${#locale.language == 'zh' and #locale.country != 'TW'}">简体中文</option>
                    <option value="zh_TW" th:selected="${#locale.country == 'TW'}">繁體中文</option>
                </select>
                <a href="/progress" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 text-sm" th:text="#{nav.progress}">Progress</a>
                <a href="/wrong" class="text-gray-600 dark:text-gray-300 hover:text-blue-600 text-sm" th:text="#{nav.wrong}">Wrong</a>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" th:title="#{ui.dark.mode}">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="mb-6 flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-2" th:text="#{search.title}">Search Results</h1>
                <p class="text-gray-600 dark:text-gray-300">
                    <span th:text="#{search.keyword.label}">Keyword:</span>
                    "<span th:text="${keyword}" class="font-medium text-blue-600">-</span>"
                    | <span th:text="${totalElements}" class="font-medium">0</span>
                    | <span th:text="${currentPage + 1}">1</span> / <span th:text="${totalPages}">1</span>
                </p>
            </div>
            <form th:action="@{/search}" method="get" class="flex items-center gap-2">
                <input type="hidden" name="keyword" th:value="${keyword}">
                <label class="text-sm text-gray-600 dark:text-gray-400" th:text="#{search.per.page}">Per page:</label>
                <select name="size" onchange="this.form.submit()"
                        class="border rounded px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-white">
                    <option value="10" th:selected="${pageSize == 10 || pageSize == null}">10</option>
                    <option value="50" th:selected="${pageSize == 50}">50</option>
                    <option value="100" th:selected="${pageSize == 100}">100</option>
                </select>
            </form>
        </div>

        <div class="space-y-4 mb-8">
            <div th:if="${results.empty}" class="bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-700 p-8 text-center">
                <p class="text-gray-500 dark:text-gray-400" th:text="#{search.no-results}">No results found</p>
                <a href="/" class="text-blue-600 hover:underline mt-2 inline-block" th:text="#{button.home}">Back to Home</a>
            </div>

            <div th:each="q : ${results}" class="bg-white dark:bg-gray-800 rounded-lg border dark:border-gray-700 p-6 hover:shadow-md transition">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <span class="text-xs bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded" th:text="${q.topicName}">Topic</span>
                        <span class="text-xs ml-2 text-gray-400" th:text="'#' + ${q.id}">#1</span>
                        <span class="text-xs ml-2 px-2 py-0.5 rounded"
                              th:classappend="${q.difficulty == 1} ? 'bg-green-100 text-green-600' : (${q.difficulty == 2} ? 'bg-yellow-100 text-yellow-600' : 'bg-red-100 text-red-600')"
                              th:text="${q.difficulty == 1 ? #messages.msg('difficulty.easy') : q.difficulty == 2 ? #messages.msg('difficulty.medium') : #messages.msg('difficulty.hard')}">Medium</span>
                    </div>
                </div>
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2" th:text="${q.question}">Question</h3>
                <div class="flex items-center justify-end gap-4">
                    <a th:href="@{/question/{id}(id=${q.id})}"
                       class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 text-sm"
                       th:text="#{search.view.question}">View Question</a>
                    <a th:href="@{/learn/{topicId}(topicId=${q.topicId})}"
                       class="text-blue-600 hover:text-blue-800 text-sm font-medium"
                       th:text="#{question.practice}">Start Practice</a>
                </div>
            </div>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}" class="flex justify-center items-center space-x-2">
            <a th:if="${hasPrevious}"
               th:href="@{/search(keyword=${keyword}, page=${currentPage - 1}, size=${pageSize})}"
               class="px-3 py-1 border rounded hover:bg-gray-50 dark:border-gray-600 dark:hover:bg-gray-700 dark:text-gray-300"
               th:text="#{button.prev.page}">Previous</a>
            <span th:unless="${hasPrevious}" class="px-3 py-1 text-gray-400" th:text="#{button.prev.page}">Previous</span>

            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:if="${i == currentPage}"
                   class="px-3 py-1 bg-blue-600 text-white rounded"
                   th:text="${i + 1}">1</a>
                <a th:unless="${i == currentPage}"
                   th:href="@{/search(keyword=${keyword}, page=${i}, size=${pageSize})}"
                   class="px-3 py-1 border rounded hover:bg-gray-50 dark:border-gray-600 dark:hover:bg-gray-700 dark:text-gray-300"
                   th:text="${i + 1}">1</a>
            </th:block>

            <a th:if="${hasNext}"
               th:href="@{/search(keyword=${keyword}, page=${currentPage + 1}, size=${pageSize})}"
               class="px-3 py-1 border rounded hover:bg-gray-50 dark:border-gray-600 dark:hover:bg-gray-700 dark:text-gray-300"
               th:text="#{button.next.page}">Next</a>
            <span th:unless="${hasNext}" class="px-3 py-1 text-gray-400" th:text="#{button.next.page}">Next</span>
        </div>
    </main>

    <footer class="text-center text-gray-500 dark:text-gray-400 text-sm py-8" th:text="#{app.footer}">
        Java Interview Learning Platform
    </footer>
</body>
</html>
