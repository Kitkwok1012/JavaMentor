<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaMentor - 學習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">JavaMentor</a>
            <div class="space-x-4">
                <a href="/progress" class="text-gray-600 hover:text-blue-600">學習進度</a>
                <a href="/wrong" class="text-gray-600 hover:text-blue-600">錯題簿</a>
            </div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Back Link -->
        <a href="/" class="text-blue-600 hover:underline mb-6 inline-block">&larr; 返回首頁</a>
        
        <!-- Topic Header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-900" th:text="${topic.name}">Topic Name</h1>
            <p class="text-gray-500" th:text="${topic.description}">Description</p>
        </div>
        
        <!-- Completed State -->
        <div th:if="${completed}" class="text-center py-12">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">呢個Topic完成晒啦！</h2>
            <p class="text-gray-500 mb-6">做得幾好！要唔要再溫一次？</p>
            <div class="space-x-4">
                <a th:href="@{/learn/{topicId}(topicId=${topic.topicId})}" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">再做一次</a>
                <a href="/" class="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">返去首頁</a>
            </div>
        </div>
        
        <!-- Question -->
        <div th:if="${question != null and (completed == null or not completed)}" class="bg-white rounded-lg shadow-sm border p-8 fade-in">
            <div class="flex justify-between items-center mb-6">
                <span class="text-sm text-gray-500">問題</span>
                <span class="text-sm bg-gray-100 text-gray-600 px-2 py-1" th:text="${question.difficulty == 1 ? '簡單' : question.difficulty == 2 ? '中等' : '困難'}">中等</span>
            </div>
            
            <h2 class="text-xl font-medium text-gray-900 mb-8" th:text="${question.question}">Question text goes here?</h2>
            
            <form th:action="@{/answer}" method="post" id="answerForm">
                <input type="hidden" name="questionId" th:value="${question.id}">
                <input type="hidden" name="topicId" th:value="${question.topicId}">
                
                <!-- Single Select: Radio buttons -->
                <div th:if="${question.multiSelect == null or not question.multiSelect}" class="space-y-4 mb-8">
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="answer" value="A" class="mt-1 mr-3" required>
                        <span class="font-medium mr-2">A.</span>
                        <span th:text="${question.optionA}">Option A</span>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="answer" value="B" class="mt-1 mr-3">
                        <span class="font-medium mr-2">B.</span>
                        <span th:text="${question.optionB}">Option B</span>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="answer" value="C" class="mt-1 mr-3">
                        <span class="font-medium mr-2">C.</span>
                        <span th:text="${question.optionC}">Option C</span>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="radio" name="answer" value="D" class="mt-1 mr-3">
                        <span class="font-medium mr-2">D.</span>
                        <span th:text="${question.optionD}">Option D</span>
                    </label>
                </div>
                
                <!-- Multi Select: Checkboxes -->
                <div th:if="${question.multiSelect}" class="space-y-4 mb-8">
                    <p class="text-sm text-gray-500 mb-4">請選擇所有正確答案（可多選）</p>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="checkbox" name="answer" value="A" class="mt-1 mr-3">
                        <span class="font-medium mr-2">A.</span>
                        <span th:text="${question.optionA}">Option A</span>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="checkbox" name="answer" value="B" class="mt-1 mr-3">
                        <span class="font-medium mr-2">B.</span>
                        <span th:text="${question.optionB}">Option B</span>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="checkbox" name="answer" value="C" class="mt-1 mr-3">
                        <span class="font-medium mr-2">C.</span>
                        <span th:text="${question.optionC}">Option C</span>
                    </label>
                    <label class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="checkbox" name="answer" value="D" class="mt-1 mr-3">
                        <span class="font-medium mr-2">D.</span>
                        <span th:text="${question.optionD}">Option D</span>
                    </label>
                    <label th:if="${question.optionE != null}" class="flex items-start p-4 border rounded-lg cursor-pointer hover:bg-blue-50 transition">
                        <input type="checkbox" name="answer" value="E" class="mt-1 mr-3">
                        <span class="font-medium mr-2">E.</span>
                        <span th:text="${question.optionE}">Option E</span>
                    </label>
                </div>
                
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                    提交答案
                </button>
            </form>
        </div>
        
        <!-- Answer Result -->
        <div th:if="${response}" class="bg-white rounded-lg shadow-sm border p-8 fade-in">
            <!-- Correct/Wrong Banner -->
            <div th:class="${response.correct ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}" 
                 class="border rounded-lg p-4 mb-6">
                <div class="flex items-center">
                    <span class="text-2xl mr-3" th:text="${response.correct ? '✅' : '❌'}">✅</span>
                    <span th:class="${response.correct ? 'text-green-700' : 'text-red-700'}" 
                          class="text-xl font-bold" th:text="${response.correct ? '答啱啦！' : '答錯啦！'}">答啱啦！</span>
                </div>
            </div>
            
            <!-- Explanation -->
            <div class="mb-6">
                <h3 class="font-semibold text-gray-900 mb-2">📖 詳細解釋</h3>
                <p class="text-gray-700 leading-relaxed" th:text="${response.explanation}">Explanation...</p>
            </div>
            
            <!-- Correct Answer -->
            <div class="mb-6 p-4 bg-blue-50 rounded-lg">
                <span class="font-medium text-blue-700">正確答案: </span>
                <span class="text-blue-900" th:text="${response.correctAnswer}">B</span>
            </div>
            
            <!-- Follow-up Question (Mock) -->
            <div th:if="${response.hasFollowUp}" class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
                <h3 class="font-semibold text-yellow-800 mb-2">🤔 AI追問 (Mock)</h3>
                <p class="text-yellow-900 mb-4" th:text="${response.followUpQuestion}">Follow-up question...</p>
                <p class="text-sm text-yellow-700">(AI追問功能待接入...)</p>
            </div>
            
            <!-- Next Question Button -->
            <div class="flex gap-4">
                <a th:href="@{/question/next(topicId=${topicId})}" 
                   class="flex-1 text-center bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                    下一題
                </a>
                <a href="/" class="px-6 py-3 border rounded-lg hover:bg-gray-50">
                    退出
                </a>
            </div>
        </div>
    </main>
</body>
</html>
