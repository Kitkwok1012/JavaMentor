<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaMentor - Java面試互動學習</title>
    
    <!-- Tailwind CSS - CDN for dev only -->
    <th:block th:if="${@environment.getProperty('app.profile', 'prod') == 'dev'}">
        <script src="https://cdn.tailwindcss.com"></script>
    </th:block>
    <th:block th:unless="${@environment.getProperty('app.profile', 'prod') == 'dev'}">
        <link rel="stylesheet" th:href="@{/css/main.css}">
    </th:block>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">JavaMentor</a>
            <div class="space-x-4 flex items-center">
                <!-- Language Selector -->
                <select onchange="window.location.href=this.value" class="text-sm border rounded px-2 py-1">
                    <option value="?lang=en" th:selected="${#locale.language == 'en'}">English</option>
                    <option value="?lang=zh" th:selected="${#locale.language == 'zh' && #locale.country != 'TW'}">简体中文</option>
                    <option value="?lang=zh_TW" th:selected="${#locale.country == 'TW'}">繁體中文</option>
                </select>
                
                <span th:if="${stats}" class="text-sm text-gray-500">
                    總答題: <span class="font-medium text-gray-700" th:text="${stats.totalAnswered}">0</span> | 
                    正確率: <span class="font-medium text-green-600" th:text="${stats.accuracy}">0</span>%
                </span>
                <a href="/progress" class="text-gray-600 hover:text-blue-600">學習進度</a>
                <a href="/wrong" class="text-gray-600 hover:text-blue-600">錯題簿</a>
                <form th:action="@{/reset-all}" method="POST" onsubmit="return confirm('確定要清除所有學習進度嗎？此操作不可復原。')" style="display:inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="text-red-500 hover:text-red-700 text-sm">清除進度</button>
                </form>
            </div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- Hero Section -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Java面試互動學習</h1>
            <p class="text-xl text-gray-600 mb-8">一題接一題，AI追問幫助您真實掌握每個知識點</p>
        </div>
        
        <!-- Topics Grid -->
        <div class="grid md:grid-cols-2 gap-6 mb-12">
            <div th:each="p : ${progress}" class="bg-white rounded-lg shadow-sm border p-6 hover:shadow-md transition">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900" th:text="${p.topicName}">Topic Name</h3>
                        <p class="text-sm text-gray-500" th:text="${p.description}">Description</p>
                    </div>
                    <span class="text-xs bg-blue-100 text-blue-600 px-2 py-1 rounded" th:text="${p.totalQuestions} + ' 題'">10題</span>
                </div>
                
                <!-- Progress Bar -->
                <div class="mb-4">
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-500">完成度</span>
                        <span class="font-medium">[[${p.answeredQuestions}]]/[[${p.totalQuestions}]]</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="bg-blue-600 h-2 rounded-full" th:style="'width: ' + (${p.totalQuestions > 0} ? ${p.answeredQuestions * 100.0 / p.totalQuestions} : 0) + '%'"></div>
                    </div>
                </div>
                
                <a th:href="@{/learn/{topicId}(topicId=${p.topicId})}" 
                   class="block w-full text-center bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                    開始學習
                </a>
            </div>
        </div>
        
        <!-- Features -->
        <div class="grid md:grid-cols-3 gap-8 text-center">
            <div class="p-6">
                <div class="text-3xl mb-3">🎯</div>
                <h3 class="font-semibold mb-2">一題接一題</h3>
                <p class="text-gray-500 text-sm">模擬真實面試，一題答完才顯示下一題</p>
            </div>
            <div class="p-6">
                <div class="text-3xl mb-3">🤔</div>
                <h3 class="font-semibold mb-2">AI追問</h3>
                <p class="text-gray-500 text-sm">根據您的回答追問，確保您真正理解</p>
            </div>
            <div class="p-6">
                <div class="text-3xl mb-3">📚</div>
                <h3 class="font-semibold mb-2">錯題複習</h3>
                <p class="text-gray-500 text-sm">記錄您的錯題，隨時翻查</p>
            </div>
        </div>
    </main>
    
    <footer class="text-center text-gray-500 text-sm py-8">
        Java面試互動學習平台 | Java Interview Learning Platform
    </footer>
</body>
</html>
