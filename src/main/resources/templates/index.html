<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaMentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mobile-menu { transition: transform 0.3s ease-in-out; }
        .mobile-menu.hidden { transform: translateX(100%); }
        .topic-card { transition: all 0.2s ease; }
        .topic-card:hover { transform: translateY(-2px); }
    </style>
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
        function toggleMobileMenu() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }
        function changeLang(lang) {
            window.location.href = window.location.pathname + '?lang=' + lang;
        }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 bg-black/50 z-50 hidden lg:hidden" onclick="toggleMobileMenu()">
        <div class="fixed right-0 top-0 h-full w-64 bg-white dark:bg-gray-800 shadow-lg p-6 mobile-menu" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <span class="font-bold text-lg dark:text-white" th:text="#{nav.menu}">Menu</span>
                <button onclick="toggleMobileMenu()" class="text-gray-500 dark:text-gray-300">✕</button>
            </div>
            <form th:action="@{/search}" method="get" class="mb-4">
                <input type="text" name="keyword" th:placeholder="#{search.placeholder}"
                       class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:text-white text-sm">
            </form>
            <select onchange="changeLang(this.value)" class="w-full border rounded-lg px-3 py-2 dark:bg-gray-700 dark:text-white text-sm mb-4">
                <option value="en" th:selected="${#locale.language == 'en'}">English</option>
                <option value="zh" th:selected="${#locale.language == 'zh' and #locale.country != 'TW'}">简体中文</option>
                <option value="zh_TW" th:selected="${#locale.country == 'TW'}">繁體中文</option>
            </select>
            <div class="mb-4 p-3 bg-gray-100 dark:bg-gray-700 rounded-lg" th:if="${stats}">
                <div class="text-sm text-gray-600 dark:text-gray-300">
                    <span th:text="#{stats.total.answered}">Total:</span>
                    <strong th:text="${stats.totalAnswered}">0</strong>
                    <span class="ml-2" th:text="#{stats.accuracy.label}">Accuracy:</span>
                    <strong class="text-green-600" th:text="${stats.accuracy}">0</strong>%
                </div>
            </div>
            <a href="/mock" class="block py-3 border-b dark:border-gray-700 dark:text-white" th:text="'🎯 ' + #{nav.mock}">Mock Exam</a>
            <a href="/progress" class="block py-3 border-b dark:border-gray-700 dark:text-white" th:text="'📊 ' + #{nav.progress}">Progress</a>
            <a href="/wrong" class="block py-3 border-b dark:border-gray-700 dark:text-white" th:text="'📚 ' + #{nav.wrong}">Wrong</a>
            <button onclick="toggleDarkMode()" class="block py-3 w-full text-left dark:text-white" th:text="'🌙 ' + #{ui.dark.mode}">Dark mode</button>
            <form th:action="@{/reset-all}" method="POST"
                  th:attr="data-confirm=#{button.reset.all.confirm}"
                  onsubmit="return confirm(this.dataset.confirm)" class="mt-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="text-red-500 text-sm" th:text="#{button.reset.all}">🗑️ Clear Progress</button>
            </form>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b dark:border-gray-700 sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="/"><img src="/logo-nav.svg" alt="JavaMentor" class="h-8 w-auto"></a>
                <div class="hidden lg:flex items-center space-x-2 md:space-x-4">
                    <form th:action="@{/search}" method="get" class="hidden md:flex">
                        <input type="text" name="keyword" th:placeholder="#{search.placeholder}"
                               class="border rounded-l px-2 py-1 text-sm w-24 md:w-40 dark:bg-gray-700 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded-r text-sm">🔍</button>
                    </form>
                    <select onchange="changeLang(this.value)" class="text-xs md:text-sm border rounded px-1 md:px-2 py-1 dark:bg-gray-700 dark:text-white">
                        <option value="en" th:selected="${#locale.language == 'en'}">EN</option>
                        <option value="zh" th:selected="${#locale.language == 'zh' and #locale.country != 'TW'}">简</option>
                        <option value="zh_TW" th:selected="${#locale.country == 'TW'}">繁</option>
                    </select>
                    <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" th:title="#{ui.dark.mode}">
                        <span class="dark:hidden">🌙</span>
                        <span class="hidden dark:inline">☀️</span>
                    </button>
                    <span th:if="${stats}" class="hidden md:inline text-xs text-gray-500">
                        <span class="font-medium" th:text="${stats.totalAnswered}">0</span>
                        <span class="text-green-600 font-medium" th:text="${stats.accuracy}">0</span>%
                    </span>
                    <a href="/mock" class="text-sm text-gray-600 dark:text-gray-300 hover:text-blue-600" th:text="#{nav.mock}">Mock Exam</a>
                    <a href="/progress" class="text-sm text-gray-600 dark:text-gray-300 hover:text-blue-600" th:text="#{nav.progress}">Progress</a>
                    <a href="/wrong" class="text-sm text-gray-600 dark:text-gray-300 hover:text-blue-600" th:text="#{nav.wrong}">Wrong</a>
                </div>
                <button onclick="toggleMobileMenu()" class="lg:hidden p-2">
                    <span class="text-xl">☰</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-3 md:px-4 py-6 md:py-8">
        <!-- Hero -->
        <div class="text-center mb-8 md:mb-12">
            <h1 class="text-2xl md:text-4xl font-bold text-gray-900 dark:text-white mb-2 md:mb-4" th:text="#{app.title}">JavaMentor</h1>
            <p class="text-sm md:text-xl text-gray-600 dark:text-gray-400 px-4 mb-6" th:text="#{app.tagline}">Tagline</p>
            <!-- Quick Start Buttons -->
            <div class="flex flex-wrap gap-3 justify-center mb-4">
                <a href="/learn/random" class="bg-blue-600 text-white px-5 py-2.5 rounded-lg hover:bg-blue-700 transition font-medium text-sm md:text-base"
                   th:text="#{quick.start.random}">🎲 Random Start</a>
                <a href="/mock" class="bg-indigo-600 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-700 transition font-medium text-sm md:text-base"
                   th:text="'🎯 ' + #{nav.mock}">🎯 Mock Exam</a>
            </div>
            <div class="md:hidden mt-2 inline-flex items-center gap-3 px-4 py-2 bg-white dark:bg-gray-800 rounded-full shadow-sm">
                <span class="text-sm text-gray-600 dark:text-gray-300">
                    📝 <span class="font-bold" th:text="${stats?.totalAnswered ?: 0}">0</span>
                    <span class="text-green-600 font-bold ml-1" th:text="${stats?.accuracy ?: 0}">0</span>%
                </span>
            </div>
        </div>

        <!-- Topics -->
        <div class="mb-4 flex justify-between items-center">
            <h2 class="text-lg md:text-xl font-bold text-gray-900 dark:text-white" th:text="#{topics.title}">Topics</h2>
            <div class="flex items-center gap-3">
                <span class="text-xs md:text-sm text-gray-500" th:text="${progress.size()} + ' Topics'">Topics</span>
                <form th:action="@{/reset-all}" method="POST"
                      th:attr="data-confirm=#{button.reset.all.confirm}"
                      onsubmit="return confirm(this.dataset.confirm)">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="text-xs text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300"
                            th:text="#{button.reset.all}">🗑️ Clear Progress</button>
                </form>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3 md:gap-4">
            <a th:each="p : ${progress}"
               th:href="@{/learn/{id}(id=${p.topicId})}"
               class="topic-card block bg-white dark:bg-gray-800 rounded-lg shadow-sm border dark:border-gray-700 p-4 hover:shadow-md hover:border-blue-300 dark:hover:border-blue-600 transition">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="font-semibold text-gray-900 dark:text-white text-sm md:text-base truncate" th:text="${p.topicName}">Topic Name</h3>
                    <span class="text-xs bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-300 px-2 py-0.5 rounded whitespace-nowrap"
                          th:text="${p.totalQuestions}">10</span>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-2 mb-3" th:text="${p.description}">Description</p>
                <div class="flex items-center gap-2">
                    <div class="flex-1 h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-600 rounded-full transition-all"
                             th:style="'width:' + ${p.totalQuestions > 0 ? p.answeredQuestions * 100 / p.totalQuestions : 0} + '%'"></div>
                    </div>
                    <span class="text-xs text-gray-500 whitespace-nowrap" th:text="${p.answeredQuestions} + '/' + ${p.totalQuestions}">0/10</span>
                </div>
            </a>
        </div>
    </main>

    <footer class="bg-white dark:bg-gray-800 border-t dark:border-gray-700 mt-8 md:mt-12 py-6">
        <div class="max-w-6xl mx-auto px-4 text-center text-sm text-gray-500">
            <p th:text="#{app.footer}">Java Interview Learning Platform</p>
            <p class="mt-1 text-xs" th:text="#{app.footer.note}">Built with love</p>
        </div>
    </footer>
</body>
</html>
