<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaMentor - 學習進度 | Learning Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">JavaMentor</a>
            <div class="space-x-4 flex items-center">
                <!-- Search Form -->
                <form th:action="@{/search}" method="get" class="flex">
                    <input type="text" name="keyword" 
                           placeholder="搜尋題目..."
                           class="border rounded-l px-3 py-1 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded-r text-sm hover:bg-blue-700">搜尋</button>
                </form>
                <a href="/progress" class="text-gray-600 hover:text-blue-600">學習進度</a>
                <a href="/wrong" class="text-gray-600 hover:text-blue-600">錯題簿</a>
                <form th:action="@{/reset-all}" method="POST" onsubmit="return confirm('確定要清除所有學習進度嗎？此操作不可復原。')" style="display:inline;">
                    <button type="submit" class="text-red-500 hover:text-red-700 text-sm">清除進度</button>
                </form>
            </div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-8">
        <a href="/" class="text-blue-600 hover:underline mb-6 inline-block">&larr; 返回首頁 | Back to Home</a>
        
        <h1 class="text-2xl font-bold text-gray-900 mb-4">學習進度 | Learning Progress</h1>
        
        <!-- Overall Stats -->
        <div th:if="${stats}" class="bg-white rounded-lg shadow-sm border p-6 mb-8">
            <div class="grid grid-cols-4 gap-4 text-center">
                <div>
                    <div class="text-2xl font-bold text-blue-600" th:text="${stats.totalAnswered}">0</div>
                    <div class="text-sm text-gray-500">總答題 | Total</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-green-600" th:text="${stats.totalCorrect}">0</div>
                    <div class="text-sm text-gray-500">正確 | Correct</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-red-600" th:text="${stats.totalWrong}">0</div>
                    <div class="text-sm text-gray-500">錯誤 | Wrong</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-purple-600" th:text="${stats.accuracy}">0%</div>
                    <div class="text-sm text-gray-500">正確率 | Accuracy</div>
                </div>
            </div>
        </div>
        
        <div class="space-y-6">
            <div th:each="p : ${progress}" class="bg-white rounded-lg shadow-sm border p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold text-lg" th:text="${p.topicName}">Topic Name</h3>
                    <span class="text-sm text-gray-500" th:text="${p.answeredQuestions} + '/' + ${p.totalQuestions} + ' 題'">5/10</span>
                </div>
                
                <div class="w-full bg-gray-200 rounded-full h-3 mb-2">
                    <div class="bg-blue-600 h-3 rounded-full transition-all" 
                         th:style="'width:' + ${p.totalQuestions > 0 ? p.answeredQuestions * 100 / p.totalQuestions : 0} + '%'"
                         style="width: 50%"></div>
                </div>
                
                <div class="flex justify-between text-sm">
                    <span class="text-gray-500">準確率 | Accuracy</span>
                    <span th:class="${p.accuracy >= 80 ? 'text-green-600' : p.accuracy >= 50 ? 'text-yellow-600' : 'text-red-600'}"
                          class="font-medium"
                          th:text="${#numbers.formatDecimal(p.accuracy, 1, 1)} + '%'">80%</span>
                </div>
                
                <a th:href="@{/learn/{topicId}(topicId=${p.topicId})}" 
                   class="mt-4 block text-center text-blue-600 hover:underline text-sm">
                    繼續學習 | Continue Learning &rarr;
                </a>
            </div>
        </div>
    </main>
</body>
</html>
