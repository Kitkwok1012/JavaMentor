<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaMentor - 錯題簿 | Wrong Answers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">JavaMentor</a>
            <div class="space-x-4 flex items-center">
                <!-- Search Form -->
                <form th:action="@{/search}" method="get" class="flex">
                    <input type="text" name="keyword" 
                           placeholder="搜尋題目..."
                           class="border rounded-l px-3 py-1 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded-r text-sm hover:bg-blue-700">搜尋</button>
                </form>
                <a href="/progress" class="text-gray-600 hover:text-blue-600">學習進度</a>
                <a href="/wrong" class="text-gray-600 hover:text-blue-600">錯題簿</a>
            </div>
        </div>
    </nav>
    
    <main class="max-w-4xl mx-auto px-4 py-8">
        <a href="/" class="text-blue-600 hover:underline mb-6 inline-block">&larr; 返回首頁 | Back to Home</a>
        
        <h1 class="text-2xl font-bold text-gray-900 mb-8">錯題簿 | Wrong Answers</h1>
        
        <div th:if="${#lists.isEmpty(wrongQuestions)}" class="text-center py-12">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-xl font-semibold text-gray-900 mb-2">沒有錯題！</h2>
            <p class="text-gray-500">您的表現非常出色！</p>
        </div>
        
        <div class="space-y-4">
            <div th:each="wp : ${wrongQuestions}" class="bg-white rounded-lg shadow-sm border p-6">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded" th:text="${wp.question.topic.name}">Topic</span>
                    <span class="text-xs text-gray-400" th:text="${#temporals.format(wp.answeredAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                </div>
                
                <h3 class="font-medium text-gray-900 mb-4" th:text="${wp.question.question}">Question?</h3>
                
                <div class="flex gap-4 text-sm mb-4">
                    <span class="text-red-600">您的答案: <strong th:text="${wp.userAnswer}">A</strong></span>
                    <span class="text-green-600">正確答案: <strong th:text="${wp.question.correctAnswer}">B</strong></span>
                </div>
                
                <div class="p-4 bg-gray-50 rounded-lg">
                    <h4 class="font-medium text-gray-700 mb-2">解釋 | Explanation</h4>
                    <p class="text-gray-600 text-sm" th:text="${wp.question.explanation}">Explanation...</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
