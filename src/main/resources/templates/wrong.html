<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{wrong.title} + ' - JavaMentor'">Wrong Answers - JavaMentor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .markdown-body p { margin: 0.4rem 0; }
        .markdown-body ul,.markdown-body ol { margin: 0.4rem 0; padding-left: 1.5rem; }
        .markdown-body code { background: #f3f4f6; padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.85em; }
        .markdown-body pre { background: #f3f4f6; padding: 0.75rem; border-radius: 6px; overflow-x: auto; }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body strong { font-weight: 600; }
        .term-tooltip {
            border-bottom: 1px dashed #6366f1;
            cursor: help;
            position: relative;
            display: inline-block;
        }
        .term-tooltip::after {
            content: attr(data-definition);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #f1f5f9;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.78rem;
            line-height: 1.4;
            width: 240px;
            white-space: normal;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            z-index: 50;
        }
        .term-tooltip:hover::after { opacity: 1; }
    </style>
    <script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
        }
        if (localStorage.getItem('darkMode') === 'true') {
            document.documentElement.classList.add('dark');
        }
        function changeLang(lang) {
            window.location.href = window.location.pathname + '?lang=' + lang;
        }
        let termsDict = null;
        fetch('/js/terms.json')
            .then(r => r.json())
            .then(data => { termsDict = data; applyTermTooltips(); });

        function applyTermTooltips() {
            if (!termsDict) return;
            const terms = Object.keys(termsDict).sort((a, b) => b.length - a.length);
            document.querySelectorAll('.markdown-body').forEach(el => {
                highlightTerms(el, terms);
            });
        }

        function highlightTerms(root, terms) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            const nodes = [];
            let node;
            while ((node = walker.nextNode())) nodes.push(node);
            nodes.forEach(textNode => {
                const parent = textNode.parentNode;
                if (!parent || parent.classList?.contains('term-tooltip')) return;
                let ancestor = parent;
                while (ancestor && ancestor !== root) {
                    if (ancestor.tagName === 'CODE' || ancestor.tagName === 'PRE') return;
                    ancestor = ancestor.parentNode;
                }
                let text = textNode.textContent.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                let matched = false;
                terms.forEach(term => {
                    if (text.includes(term)) {
                        const def = termsDict[term].replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
                        text = text.split(term).join(
                            `<span class="term-tooltip" data-definition="${def}">${term}</span>`
                        );
                        matched = true;
                    }
                });
                if (matched) {
                    const tpl = document.createElement('template');
                    tpl.innerHTML = text;
                    parent.replaceChild(tpl.content, textNode);
                }
            });
        }

        function applyFilters() {
            const topic = document.getElementById('filterTopic').value;
            const difficulty = document.getElementById('filterDifficulty').value;
            let visible = 0;
            document.querySelectorAll('.wrong-card').forEach(card => {
                const matchTopic = !topic || card.dataset.topic === topic;
                const matchDiff  = !difficulty || card.dataset.difficulty === difficulty;
                const show = matchTopic && matchDiff;
                card.style.display = show ? '' : 'none';
                if (show) visible++;
            });
            const countEl = document.getElementById('filterCount');
            if (countEl) countEl.textContent = visible + ' / ' + document.querySelectorAll('.wrong-card').length;
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('[data-markdown]').forEach(function(el) {
                el.innerHTML = marked.parse(el.getAttribute('data-markdown') || '');
            });
            applyTermTooltips();

            // Build topic dropdown from cards
            const topicSelect = document.getElementById('filterTopic');
            if (topicSelect) {
                const seen = new Map();
                document.querySelectorAll('.wrong-card').forEach(card => {
                    const id = card.dataset.topic;
                    if (id && !seen.has(id)) {
                        seen.set(id, card.dataset.topicName || id);
                    }
                });
                seen.forEach((name, id) => {
                    const opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = name;
                    topicSelect.appendChild(opt);
                });
                applyFilters();
            }
        });
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors">
    <nav class="bg-white dark:bg-gray-800 shadow-sm border-b dark:border-gray-700">
        <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/"><img src="/logo-nav.svg" alt="JavaMentor" class="h-8 w-auto"></a>
            <div class="space-x-4 flex items-center">
                <form th:action="@{/search}" method="get" class="flex">
                    <input type="text" name="keyword"
                           th:placeholder="#{search.placeholder}"
                           class="border rounded-l px-3 py-1 text-sm w-40 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded-r text-sm hover:bg-blue-700" th:text="#{search.button}">Search</button>
                </form>
                <select onchange="changeLang(this.value)" class="text-sm border rounded px-2 py-1 dark:bg-gray-700 dark:text-white">
                    <option value="en" th:selected="${#locale.language == 'en'}">EN</option>
                    <option value="zh" th:selected="${#locale.language == 'zh' and #locale.country != 'TW'}">简</option>
                    <option value="zh_TW" th:selected="${#locale.country == 'TW'}">繁</option>
                </select>
                <a href="/progress" class="text-gray-600 dark:text-gray-300 hover:text-blue-600" th:text="#{nav.progress}">Progress</a>
                <a href="/wrong" class="text-gray-600 dark:text-gray-300 hover:text-blue-600" th:text="#{nav.wrong}">Wrong</a>
                <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700" th:title="#{ui.dark.mode}">
                    <span class="dark:hidden">🌙</span>
                    <span class="hidden dark:inline">☀️</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <a href="/" class="text-blue-600 hover:underline mb-6 inline-block" th:text="#{wrong.back.home}">← Back to Home</a>

        <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6" th:text="#{wrong.title}">Wrong Answers</h1>

        <!-- Filters -->
        <div th:if="${!#lists.isEmpty(wrongQuestions)}" class="flex flex-wrap gap-3 mb-6">
            <select id="filterTopic" onchange="applyFilters()" class="text-sm border rounded px-3 py-1.5 dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <option value="" th:text="#{wrong.filter.all.topics}">All Topics</option>
            </select>
            <select id="filterDifficulty" onchange="applyFilters()" class="text-sm border rounded px-3 py-1.5 dark:bg-gray-700 dark:text-white dark:border-gray-600">
                <option value="" th:text="#{wrong.filter.all.difficulties}">All Difficulties</option>
                <option value="1" th:text="#{difficulty.easy}">Easy</option>
                <option value="2" th:text="#{difficulty.medium}">Medium</option>
                <option value="3" th:text="#{difficulty.hard}">Hard</option>
            </select>
            <span id="filterCount" class="text-sm text-gray-500 dark:text-gray-400 self-center"></span>
        </div>

        <div th:if="${#lists.isEmpty(wrongQuestions)}" class="text-center py-12">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2" th:text="#{wrong.empty.title}">No wrong answers!</h2>
            <p class="text-gray-500 dark:text-gray-400" th:text="#{wrong.empty.msg}">Excellent!</p>
        </div>

        <div class="space-y-4">
            <div th:each="wp : ${wrongQuestions}"
                 th:attr="data-topic=${wp.question.topic.topicId}, data-topic-name=${wp.question.topic.name}, data-difficulty=${wp.question.difficulty}"
                 class="wrong-card bg-white dark:bg-gray-800 rounded-lg shadow-sm border dark:border-gray-700 p-6">
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs bg-red-100 text-red-600 px-2 py-1 rounded" th:text="${wp.question.topic.name}">Topic</span>
                    <span class="text-xs text-gray-400" th:text="${#temporals.format(wp.answeredAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</span>
                </div>

                <h3 class="font-medium text-gray-900 dark:text-white mb-4" th:text="${wp.question.question}">Question?</h3>

                <!-- Options with highlight -->
                <div class="space-y-2 mb-4">
                    <div th:each="opt : ${wp.question.options}"
                         th:with="isCorrect=${opt.isCorrect},
                                  isSelected=${#strings.contains(wp.userAnswer, opt.label)}"
                         th:classappend="${isCorrect} ? 'bg-green-50 dark:bg-green-900/30 border-green-400 dark:border-green-600' : (${isSelected} ? 'bg-red-50 dark:bg-red-900/30 border-red-400 dark:border-red-600' : 'bg-gray-50 dark:bg-gray-700/50 border-gray-200 dark:border-gray-600')"
                         class="flex items-center justify-between px-3 py-2 border rounded-lg text-sm">
                        <div class="flex items-start gap-2">
                            <span th:classappend="${isCorrect} ? 'text-green-700 dark:text-green-300 font-semibold' : (${isSelected} ? 'text-red-700 dark:text-red-300 font-semibold' : 'text-gray-500 dark:text-gray-400')"
                                  th:text="${opt.label + '.'}">A.</span>
                            <span th:classappend="${isCorrect} ? 'text-green-900 dark:text-green-100' : (${isSelected} ? 'text-red-900 dark:text-red-100' : 'text-gray-700 dark:text-gray-300')"
                                  th:text="${opt.content}">Option</span>
                        </div>
                        <span th:if="${isCorrect}" class="text-green-600 dark:text-green-400 font-bold ml-2 shrink-0">✓</span>
                        <span th:if="${isSelected and !isCorrect}" class="text-red-600 dark:text-red-400 font-bold ml-2 shrink-0">✗</span>
                    </div>
                </div>

                <div class="p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <h4 class="font-medium text-gray-700 dark:text-gray-300 mb-2" th:text="#{wrong.explanation}">Explanation</h4>
                    <div class="text-gray-600 dark:text-gray-300 text-sm markdown-body"
                         th:attr="data-markdown=${wp.question.explanation}"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
