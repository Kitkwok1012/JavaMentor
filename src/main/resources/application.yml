spring:
  application:
    name: javamentor
  
  datasource:
    url: jdbc:h2:mem:javamentor
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  thymeleaf:
    cache: false
    mode: HTML
  
  # Redis Configuration (optional - app works without it)
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      connect-timeout: 5000ms
  
  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 3600000
      cache-null-values: false

server:
  port: 8080

logging:
  level:
    com.javamentor: DEBUG
    org.springframework.cache: DEBUG
