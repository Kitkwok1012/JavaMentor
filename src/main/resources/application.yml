spring:
  application:
    name: javamentor
  
  datasource:
    url: jdbc:h2:mem:javamentor
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  thymeleaf:
    cache: false
    mode: HTML
  
  # Caffeine Cache Configuration
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=1000,expireAfterAccess=30m

server:
  port: 8080

logging:
  level:
    com.javamentor: DEBUG
    org.springframework.cache: DEBUG
