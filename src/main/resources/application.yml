spring:
  application:
    name: javamentor
  
  datasource:
    url: jdbc:h2:${DB_PATH:-file:./data/javamentor};DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:false}
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${FORMAT_SQL:false}
  
  thymeleaf:
    cache: ${THYMELEAF_CACHE:true}
    mode: HTML

server:
  port: ${PORT:8080}

# SpringDoc OpenAPI Configuration
springdoc:
  api-docs:
    enabled: ${API_DOCS_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:false}
    path: /swagger-ui.html

# Rate limiting config
ratelimit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  requests-per-minute: ${RATE_LIMIT_RPM:60}

# Logging config  
logging:
  level:
    root: ${LOG_LEVEL:WARN}
    com.javamentor: ${LOG_LEVEL_COM:INFO}
    org.springframework.web: WARN
    org.hibernate.SQL: WARN

# App constants
app:
  title: JavaMentor - Java面試學習平台
  version: 1.0.0
