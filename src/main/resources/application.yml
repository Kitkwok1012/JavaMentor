spring:
  application:
    name: javamentor
  
  datasource:
    url: jdbc:h2:${DB_PATH:-file:./data/javamentor};DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  
  thymeleaf:
    cache: false
    mode: HTML

server:
  port: ${PORT:8080}

logging:
  level:
    com.javamentor: INFO
