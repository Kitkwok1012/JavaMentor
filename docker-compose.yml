version: '3.8'

services:
  # JavaMentor Application
  javamentor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javamentor
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=file:/app/data/javamentor
      - H2_CONSOLE_ENABLED=true
      - SHOW_SQL=true
      - THYMELEAF_CACHE=false
      - LOG_LEVEL=DEBUG
    volumes:
      - javamentor-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  # Persistent volume for H2 database
  javamentor-data:
